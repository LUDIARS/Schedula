## ─── Docker Compose ────────────────────────────────────────
##
## アプリケーションのみ。DB / Redis は共有インフラ (../infra) を使用。
##
## Usage:
##   cd ../infra && docker compose up -d   # 共有インフラ起動
##   npm run env:up                        # .env 生成 + アプリ起動
##
## 単体運用 (DB/Redis 込み):
##   npm run env:up:standalone
## ─────────────────────────────────────────────────────────────

services:
  # ─── Backend (Hono + Drizzle) ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      # ─ Infra (from .env) ─
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      DB_DIALECT: ${DB_DIALECT:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://schedula_user:schedula@host.docker.internal:5432/schedula}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379}
      FRONTEND_URL: ${FRONTEND_URL:-}
      # ─ Infisical bootstrap (バックエンドが SecretManager で残りを取得) ─
      SECRETS_PROVIDER: ${SECRETS_PROVIDER:-}
      INFISICAL_SITE_URL: ${INFISICAL_SITE_URL:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENVIRONMENT: ${INFISICAL_ENVIRONMENT:-}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}

  # ─── Frontend (React + Vite → Nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
